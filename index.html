    <script>
      // Remove Lovable widget/badge injected by hosting platform
      (function() {
        function removeLovableWidget() {
          document.querySelectorAll('a, div, button').forEach(function(el) {
            var text = (el.textContent || '').toLowerCase();
            var href = (el.getAttribute('href') || '').toLowerCase();
            var cls = (el.className || '').toLowerCase().toString();
            var isLovable = (
              text.includes('lovable') ||
              text.includes('edit with') ||
              text.includes('built with') ||
              href.includes('lovable.dev') ||
              href.includes('gptengineer') ||
              cls.includes('lovable')
            );
            if (isLovable) {
              el.remove();
            }
          });
          // Also remove fixed bottom-right elements that look like badges
          document.querySelectorAll('[style]').forEach(function(el) {
            var style = el.getAttribute('style') || '';
            if (style.match(/position\s*:\s*fixed/i) && style.match(/bottom\s*:/i) && style.match(/right\s*:/i) && style.match(/z-index\s*:\s*(9\d{4,}|10\d{4,})/i)) {
              el.remove();
            }
          });
        }
        // Run on load
        if (document.readyState === 'loading') {
          document.addEventListener('DOMContentLoaded', removeLovableWidget);
        } else {
          removeLovableWidget();
        }
        // Run continuously for 10 seconds to catch dynamically injected elements
        var attempts = 0;
        var interval = setInterval(function() {
          removeLovableWidget();
          attempts++;
          if (attempts >= 20) clearInterval(interval);
        }, 500);
        // Also use MutationObserver for ongoing monitoring
        var observer = new MutationObserver(function() {
          removeLovableWidget();
        });
        observer.observe(document.body, { childList: true, subtree: true });
      })();
    </script>

  <body>
    <div id="root"></div>
